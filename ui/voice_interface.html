<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>HackKnow AI OS — Voice Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06070d;
    --panel: #0f1320;
    --line: #1c2236;
    --accent: #21f0c5;
    --accent-dim: #0c7d68;
    --text: #e7eaf3;
    --muted: #8c93ab;
    --danger: #ff5c7c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(ellipse at top, #0f1626 0%, #06070d 60%);
    color: var(--text);
    font-family: "Space Grotesk", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  header h1 { margin: 0; font-size: 22px; letter-spacing: 0.04em; }
  header h1 span { color: var(--accent); }
  header small { color: var(--muted); font-family: "JetBrains Mono", monospace; font-size: 12px; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 360px; gap: 24px; padding: 32px; }
  .console {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    min-height: 60vh;
  }
  .log {
    flex: 1;
    overflow-y: auto;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    line-height: 1.6;
    padding-right: 12px;
  }
  .log .you { color: var(--accent); }
  .log .jarvis { color: var(--text); }
  .log .meta { color: var(--muted); }
  .row { display: flex; gap: 12px; margin-top: 16px; }
  input, button { font-family: inherit; font-size: 14px; }
  input[type=text] {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    outline: none;
  }
  button {
    background: var(--accent);
    color: #001512;
    border: 0;
    border-radius: 10px;
    padding: 12px 20px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
  }
  button.mic { background: var(--panel); border: 1px solid var(--accent); color: var(--accent); }
  button.mic.rec { background: var(--danger); color: white; border-color: var(--danger); }
  aside { display: flex; flex-direction: column; gap: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px; }
  .card h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); }
  .card ul { margin: 0; padding-left: 16px; font-size: 13px; line-height: 1.7; }
  .pill { display:inline-block; padding: 4px 10px; border-radius: 999px; background: var(--accent-dim); color: white; font-size: 11px; letter-spacing: 0.08em; }
  footer { padding: 12px 32px; border-top: 1px solid var(--line); font-family: "JetBrains Mono", monospace; color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<header>
  <h1>Hack<span>Know</span> AI&nbsp;OS</h1>
  <small>JARVIS-style autonomous OS · free intelligence, infinite capability</small>
</header>
<main>
  <section class="console">
    <div class="log" id="log"></div>
    <div class="row">
      <input id="prompt" type="text" placeholder="Boss, type a command — or hit the mic..." />
      <button id="send">Send</button>
      <button id="mic" class="mic">🎙 Hold to talk</button>
    </div>
  </section>
  <aside>
    <div class="card">
      <h2>Status</h2>
      <div id="status">Booting…</div>
    </div>
    <div class="card">
      <h2>Agents</h2>
      <ul id="agents"></ul>
    </div>
    <div class="card">
      <h2>Skills</h2>
      <ul id="skills"></ul>
    </div>
  </aside>
</main>
<footer>Hackknow · shop.hackknow.com · <span class="pill">v0.1.0</span></footer>

<script>
const log = document.getElementById("log");
const prompt = document.getElementById("prompt");
const sendBtn = document.getElementById("send");
const mic = document.getElementById("mic");
const statusEl = document.getElementById("status");
const agentsEl = document.getElementById("agents");
const skillsEl = document.getElementById("skills");

function append(role, text) {
  const div = document.createElement("div");
  div.className = role;
  div.textContent = (role === "you" ? "› " : role === "jarvis" ? "» " : "· ") + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function refreshStatus() {
  try {
    const r = await fetch("/healthcheck"); const j = await r.json();
    statusEl.innerHTML = `<span class="pill">online</span> ${j.agents.length} agents · ${j.skills.length} skills`;
    agentsEl.innerHTML = j.agents.map(a => `<li>${a}</li>`).join("");
    skillsEl.innerHTML = j.skills.map(s => `<li>${s}</li>`).join("");
  } catch (e) {
    statusEl.textContent = "Boot in progress…";
  }
}
refreshStatus();

async function send(text) {
  if (!text) return;
  append("you", text);
  prompt.value = "";
  const r = await fetch("/execute", {
    method: "POST",
    headers: {"content-type": "application/json"},
    body: JSON.stringify({goal: text}),
  });
  const j = await r.json();
  append("jarvis", j.summary || JSON.stringify(j));
  if (j.tasks && j.tasks.length) {
    append("meta", `(${j.tasks.length} subtasks · ${j.language})`);
  }
}

sendBtn.onclick = () => send(prompt.value.trim());
prompt.addEventListener("keydown", e => { if (e.key === "Enter") send(prompt.value.trim()); });

// --- Web Speech browser STT fallback (works without server STT) ---
let recog;
if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recog = new SR();
  recog.continuous = false;
  recog.interimResults = false;
  recog.lang = "en-IN";
  recog.onresult = e => {
    const text = e.results[0][0].transcript;
    send(text);
  };
  recog.onend = () => mic.classList.remove("rec");
}
mic.onmousedown = () => { if (recog) { recog.start(); mic.classList.add("rec"); } };
mic.onmouseup   = () => { if (recog) { recog.stop(); } };
mic.ontouchstart = mic.onmousedown;
mic.ontouchend = mic.onmouseup;
</script>
</body>
</html>
