name: HackKnow Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # --- Cloudflare Pages: deploys the UI (ui/) as a static site -----------
  cloudflare-pages:
    runs-on: ubuntu-latest
    if: ${{ secrets.CF_API_TOKEN != '' && secrets.CF_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Publish UI to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ui --project-name=hackknow

  # --- Docker image: builds & pushes to Docker Hub if creds present -----
  docker-image:
    runs-on: ubuntu-latest
    if: ${{ secrets.DOCKERHUB_USER != '' && secrets.DOCKERHUB_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            hackknow/ai-os:latest
            hackknow/ai-os:${{ github.sha }}

  # --- HuggingFace Spaces: pushes to a Docker Space (free) -------------
  huggingface-space:
    runs-on: ubuntu-latest
    if: ${{ secrets.HF_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Configure git
        run: |
          git config user.email "boss@hackknow.com"
          git config user.name  "Hackknow Bot"
      - name: Use HF Spaces Dockerfile
        run: cp Dockerfile.spaces Dockerfile
      - name: Push to HF Spaces
        env: { HF_TOKEN: ${{ secrets.HF_TOKEN }} }
        run: |
          git add Dockerfile && git commit -m "use Spaces Dockerfile" || true
          git remote add space https://gaganchauhan1997:$HF_TOKEN@huggingface.co/spaces/gaganchauhan1997/hackknow-ai-os || true
          git push -f space main:main
